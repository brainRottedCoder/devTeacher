global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sudomakeworld'
    environment: 'production'

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'

  - job_name: 'content-service'
    static_configs:
      - targets: ['content-service:3002']
    metrics_path: '/metrics'

  - job_name: 'simulation-service'
    static_configs:
      - targets: ['simulation-service:3003']
    metrics_path: '/metrics'

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:3004']
    metrics_path: '/metrics'

  - job_name: 'community-service'
    static_configs:
      - targets: ['community-service:3005']
    metrics_path: '/metrics'

  - job_name: 'kong-gateway'
    static_configs:
      - targets: ['gateway:8001']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
