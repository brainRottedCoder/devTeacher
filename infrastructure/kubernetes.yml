apiVersion: v1
kind: Namespace
metadata:
  name: sudomakeworld
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sudomakeworld
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/sudomakeworld"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: sudomakeworld
type: Opaque
stringData:
  JWT_SECRET: "your-jwt-secret"
  SUPABASE_URL: "your-supabase-url"
  SUPABASE_ANON_KEY: "your-supabase-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "your-supabase-service-role-key"
  OPENAI_API_KEY: "your-openai-api-key"
  MEGALLM_API_KEY: "your-megallm-api-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sudomakeworld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: sudomakeworld/auth-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: sudomakeworld
spec:
  replicas: 3
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      containers:
        - name: community-service
          image: sudomakeworld/community-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  namespace: sudomakeworld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      containers:
        - name: content-service
          image: sudomakeworld/content-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: sudomakeworld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: sudomakeworld/ai-service:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-service
  namespace: sudomakeworld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simulation-service
  template:
    metadata:
      labels:
        app: simulation-service
    spec:
      containers:
        - name: simulation-service
          image: sudomakeworld/simulation-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sudomakeworld
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: community-service
  namespace: sudomakeworld
spec:
  selector:
    app: community-service
  ports:
    - port: 3005
      targetPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: content-service
  namespace: sudomakeworld
spec:
  selector:
    app: content-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: sudomakeworld
spec:
  selector:
    app: ai-service
  ports:
    - port: 3004
      targetPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: simulation-service
  namespace: sudomakeworld
spec:
  selector:
    app: simulation-service
  ports:
    - port: 3003
      targetPort: 3003
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: sudomakeworld
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.sudomakeworld.com
      secretName: api-tls
  rules:
    - host: api.sudomakeworld.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/community
            pathType: Prefix
            backend:
              service:
                name: community-service
                port:
                  number: 3005
          - path: /api/modules
            pathType: Prefix
            backend:
              service:
                name: content-service
                port:
                  number: 3002
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 3004
          - path: /api/simulate
            pathType: Prefix
            backend:
              service:
                name: simulation-service
                port:
                  number: 3003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: community-service-hpa
  namespace: sudomakeworld
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: community-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: sudomakeworld
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
